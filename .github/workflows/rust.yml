name: Aurora CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libudev-dev \
          libinput-dev \
          libegl1-mesa-dev \
          libgles2-mesa-dev \
          libgbm-dev \
          libdrm-dev

    - name: Build project
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
